networks:
  quiz-network:
    driver: bridge

services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-quiz}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quiz}
      POSTGRES_DB: ${POSTGRES_DB:-quiz}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - quiz-network

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: Host=db;Port=5432;Database=${POSTGRES_DB:-quiz};Username=${POSTGRES_USER:-quiz};Password=${POSTGRES_PASSWORD:-quiz}
      Cors__AllowedOrigins__0: ${FRONTEND_ORIGIN:-http://localhost:3000}
      Database__SeedDemoData: ${SEED_DEMO_DATA:-true}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - quiz-network

  frontend:
    build:
      context: ./Webui
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${PUBLIC_API_BASE_URL:-http://localhost:8080}
    environment:
      HOST: 0.0.0.0
      PORT: 3000
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    networks:
      - quiz-network

volumes:
  postgres_data:
