networks:
  quiz-network:
    driver: bridge

services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-quiz}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quiz}
      POSTGRES_DB: ${POSTGRES_DB:-quiz}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - quiz-network

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Postgres: Host=db;Port=5432;Database=${POSTGRES_DB:-quiz};Username=${POSTGRES_USER:-quiz};Password=${POSTGRES_PASSWORD:-quiz}
      Cors__AllowedOrigins__0: ${FRONTEND_ORIGIN:-http://localhost:3000}
      Database__SeedDemoData: ${SEED_DEMO_DATA:-true}
      InitialAdmin__Username: ${INITIAL_ADMIN_USERNAME:-}
      InitialAdmin__Email: ${INITIAL_ADMIN_EMAIL:-}
      InitialAdmin__Password: ${INITIAL_ADMIN_PASSWORD:-}
      Oidc__Issuer: ${OIDC_ISSUER:-http://localhost:8080}
      Oidc__WebuiRedirectUri: ${FRONTEND_ORIGIN:-http://localhost:3000}/admin/auth/callback
      Oidc__WebuiPostLogoutRedirectUri: ${FRONTEND_ORIGIN:-http://localhost:3000}/admin/login
      Oidc__AllowEphemeralCredentials: ${OIDC_ALLOW_EPHEMERAL_CREDENTIALS:-true}
      Oidc__SigningCertificateBase64: ${OIDC_SIGNING_CERTIFICATE_BASE64:-}
      Oidc__SigningCertificatePassword: ${OIDC_SIGNING_CERTIFICATE_PASSWORD:-}
      Oidc__EncryptionKeyBase64: ${OIDC_ENCRYPTION_KEY_BASE64:-}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - quiz-network

  frontend:
    build:
      context: ./Webui
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${PUBLIC_API_BASE_URL:-http://localhost:8080}
    environment:
      HOST: 0.0.0.0
      PORT: 3000
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    networks:
      - quiz-network

volumes:
  postgres_data:
